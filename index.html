<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0d">
  <title>Theater Teleprompter</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Taugliches Amateur Theater</p>
      <h1>Theater Teleprompter</h1>
    </div>
    <div class="top-actions">
      <button id="themeButton" class="secondary" type="button">Nachtmodus</button>
      <button id="fullscreenButton" class="secondary" type="button">Vollbild</button>
    </div>
  </header>

  <main>
    <section id="setupPanel" class="setup-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Text vorbereiten</p>
          <h2>Stück laden</h2>
        </div>
        <label class="file-button">
          TXT laden
          <input id="fileInput" type="file" accept=".txt,text/plain">
        </label>
      </div>

      <textarea id="scriptInput" spellcheck="false" placeholder="Theatertext hier einfügen …\n\nAKT 1\nSZENE 1\n\nFIGUR: Die erste Replik."></textarea>

      <div class="setup-actions">
        <button id="loadButton" type="button">Text übernehmen</button>
        <button id="demoButton" class="secondary" type="button">Demo einsetzen</button>
        <button id="clearButton" class="ghost" type="button">Leeren</button>
      </div>
    </section>

    <section id="prompterPanel" class="prompter-panel hidden" aria-label="Teleprompter">
      <aside class="sidebar">
        <div class="sidebar-header">
          <p class="eyebrow">Navigation</p>
          <h2>Szenen</h2>
        </div>
        <nav id="sceneList" class="scene-list" aria-label="Szenenübersicht"></nav>
        <button id="editButton" class="secondary full-width" type="button">Text bearbeiten</button>
      </aside>

      <div class="stage-wrap">
        <div class="statusbar">
          <span id="statusText">Bereit</span>
          <span id="progressText">0 %</span>
        </div>
        <div id="stage" class="stage" tabindex="0" aria-live="off">
          <article id="scriptDisplay" class="script-display"></article>
        </div>

        <div class="controls" aria-label="Teleprompter-Steuerung">
          <button id="rewindButton" class="secondary control-button" type="button" aria-label="Zurückspringen">−10 s</button>
          <button id="playButton" class="primary control-button" type="button">Start</button>
          <button id="forwardButton" class="secondary control-button" type="button" aria-label="Vorspringen">+10 s</button>

          <label class="slider-control">
            <span>Tempo <strong id="speedValue">24</strong></span>
            <input id="speedInput" type="range" min="4" max="100" value="24">
          </label>

          <label class="slider-control">
            <span>Schrift <strong id="fontValue">46</strong></span>
            <input id="fontInput" type="range" min="28" max="90" value="46">
          </label>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
