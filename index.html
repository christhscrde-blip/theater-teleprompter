<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0e12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Theater-Teleprompter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">TAT</div>
      <div><p class="eyebrow">Taugliches Amateur Theater</p><h1>Theater-Teleprompter</h1></div>
    </div>
    <div class="header-actions">
      <button id="themeButton" type="button">Heller Modus</button>
      <button id="fullscreenButton" class="primary" type="button">Vollbild</button>
    </div>
  </header>

  <main>
    <section id="importPanel" class="card import-panel">
      <div class="import-copy">
        <span class="import-icon" aria-hidden="true">Aa</span>
        <div><p class="eyebrow">Dein Bühnenmanuskript</p><h2>Datei öffnen</h2><p>DOCX oder textbasierte PDF auswählen. Die Datei bleibt vollständig auf diesem Gerät.</p></div>
      </div>
      <label class="file-button" for="fileInput">Datei auswählen</label>
      <input id="fileInput" type="file" accept=".docx,.pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/pdf">
      <p id="importStatus" class="status" aria-live="polite">Noch keine Datei geladen.</p>
    </section>

    <section id="workspace" class="workspace hidden">
      <aside class="card sidebar">
        <p class="eyebrow">Navigation</p><h2 id="documentTitle">Theatertext</h2>
        <div class="tabs" role="tablist">
          <button class="tab active" data-mode="acts" type="button">Akte</button>
          <button class="tab" data-mode="scenes" type="button">Szenen</button>
          <button class="tab" data-mode="pages" type="button">Seiten</button>
        </div>
        <nav id="navigationList" class="navigation-list"></nav>
      </aside>

      <section class="prompter-column">
        <div class="status-row">
          <span id="locationText" class="location">Bereit</span>
          <span class="position"><span id="pageText">Seite 1</span><span aria-hidden="true">·</span><span id="progressText">0 %</span></span>
        </div>
        <div id="stage" class="stage" tabindex="0">
          <div class="reading-guide" aria-hidden="true"></div>
          <article id="scriptDisplay" class="script-display"></article>
        </div>
        <div class="card controls">
          <div class="transport" role="group" aria-label="Wiedergabesteuerung">
            <button id="previousButton" type="button">← Seite</button>
            <button id="rewindButton" type="button">−10 s</button>
            <button id="playButton" class="primary play-button" type="button">Start</button>
            <button id="forwardButton" type="button">+10 s</button>
            <button id="nextButton" type="button">Seite →</button>
          </div>
          <div class="reading-settings">
            <label><span>Tempo <strong id="speedValue">24</strong></span><input id="speedInput" type="range" min="4" max="100" value="24"></label>
            <label><span>Schrift <strong id="fontValue">46</strong></span><input id="fontInput" type="range" min="28" max="82" value="46"></label>
            <label><span>Zeilenhöhe <strong id="lineHeightValue">1.55</strong></span><input id="lineHeightInput" type="range" min="1.25" max="2" step="0.05" value="1.55"></label>
          </div>
        </div>
      </section>
    </section>
  </main>

  <button id="exitPresentationButton" class="exit-presentation" type="button">Vollbild verlassen</button>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
