name: Prepare version 10 runtime

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: prepare-v10-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare-runtime:
    if: github.event.pull_request.head.ref == 'hotfix/direct-json-v10'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Verify direct data exists
        shell: bash
        run: |
          set -euo pipefail
          test -f theater-data.js
          node --check theater-data.js
          grep -q '"title":"Die Räuber"' theater-data.js
          grep -q '"paragraphCount":1457' theater-data.js
          grep -q '"pageCount":63' theater-data.js
          grep -q '"physicalPageCount":64' theater-data.js
          grep -q '"text":"ENDE"' theater-data.js

      - name: Prepare the direct-data runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('app.js')
          source = path.read_text(encoding='utf-8')
          source, count = re.subn(r'const VERSION = \d+;', 'const VERSION = 10;', source, count=1)
          if count != 1:
              raise RuntimeError('Could not update app VERSION')
          path.write_text(source, encoding='utf-8')
          PY

          cat > service-worker.js <<'EOF'
          const CACHE_NAME = 'theater-teleprompter-v10';
          const CORE_ASSETS = [
            './',
            './index.html',
            './styles.css?v=10',
            './app.js?v=10',
            './theater-data.js?v=10',
            './manifest.webmanifest?v=10'
          ];

          self.addEventListener('install', event => {
            event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(CORE_ASSETS)));
            self.skipWaiting();
          });

          self.addEventListener('activate', event => {
            event.waitUntil(
              caches.keys().then(keys => Promise.all(
                keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
              ))
            );
            self.clients.claim();
          });

          self.addEventListener('fetch', event => {
            const request = event.request;
            const url = new URL(request.url);
            if (request.method !== 'GET' || url.origin !== self.location.origin) return;

            if (request.mode === 'navigate') {
              event.respondWith(
                fetch(request, { cache: 'no-store' })
                  .then(response => {
                    if (response.ok) {
                      caches.open(CACHE_NAME).then(cache => cache.put('./index.html', response.clone()));
                    }
                    return response;
                  })
                  .catch(() => caches.match('./index.html'))
              );
              return;
            }

            event.respondWith(
              caches.match(request).then(cached => cached || fetch(request).then(response => {
                if (response.ok) {
                  caches.open(CACHE_NAME).then(cache => cache.put(request, response.clone()));
                }
                return response;
              }))
            );
          });
          EOF

          rm -f theater-loader.js theater-payload-01.txt theater-payload-02.txt theater-payload-03.txt theater-payload-04.txt
          node --check app.js
          node --check service-worker.js

      - name: Commit the prepared runtime
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Version 10 runtime is already prepared.'
            exit 0
          fi
          git commit -m 'Switch runtime to validated direct theater data'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
