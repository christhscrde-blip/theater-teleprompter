name: Import browser test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_URL: ${{ github.event_name == 'push' && 'https://christhscrde-blip.github.io/theater-teleprompter/' || 'http://127.0.0.1:4173/' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install browser tools
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 jszip@3.10.1 pdfkit@0.16.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Generate DOCX and PDF fixtures
        run: |
          node <<'JS'
          const fs=require('fs');
          const JSZip=require('jszip');
          const PDFDocument=require('pdfkit');
          (async()=>{
            const core=['DIE RÄUBER','ERSTER AKT','1. SZENE','Saal im Moorischen Schloss.','FRANZ','Aber ist Euch auch wohl, Vater?','D. A. MOOR','Ganz wohl, mein Sohn.','ZWEITER AKT','1. SZENE','AMALIA','Karl lebt noch!'];
            const lines=[...core,...Array.from({length:48},(_,i)=>`Zusätzliche Replik für den Scrolltest ${i+1}.`)];
            const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const zip=new JSZip();
            zip.file('[Content_Types].xml','<?xml version="1.0"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>');
            zip.folder('_rels').file('.rels','<?xml version="1.0"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>');
            zip.folder('word').file('document.xml',`<?xml version="1.0"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${lines.map(x=>`<w:p><w:r><w:t>${esc(x)}</w:t></w:r></w:p>`).join('')}</w:body></w:document>`);
            fs.writeFileSync('/tmp/test.docx',await zip.generateAsync({type:'nodebuffer'}));
            const pdf=new PDFDocument({autoFirstPage:false});
            pdf.pipe(fs.createWriteStream('/tmp/test.pdf'));
            for(const pageLines of [lines.slice(0,30),lines.slice(30)]){pdf.addPage();pageLines.forEach((x,i)=>pdf.text(x,55,45+i*22));}
            pdf.end();
          })();
          JS
      - name: Start local server
        if: github.event_name != 'push'
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/server.log 2>&1 &
          curl --retry 20 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4173/ >/dev/null
      - name: Test DOCX, PDF and auto-scroll
        run: |
          node <<'JS'
          const assert=require('node:assert/strict');
          const {chromium}=require('playwright');
          (async()=>{
            const browser=await chromium.launch({headless:true});
            for(const [file,source,expectedPages] of [['/tmp/test.docx','DOCX',3],['/tmp/test.pdf','PDF',2]]){
              console.log(`Testing ${source}`);
              const context=await browser.newContext({viewport:{width:820,height:1180}});
              const page=await context.newPage();
              const errors=[];page.on('pageerror',e=>errors.push(e.message));
              await page.goto(process.env.TARGET_URL+'?test='+Date.now(),{waitUntil:'networkidle',timeout:30000});
              assert.equal(await page.locator('#fileInput').count(),1,`${source}: file input missing`);
              await page.setInputFiles('#fileInput',file);
              await page.waitForFunction(()=>window.__TELEPROMPTER__?.getState?.().paragraphs>=60,{timeout:20000});
              const state=await page.evaluate(()=>window.__TELEPROMPTER__.getState());
              console.log(`${source} state`,state);
              assert.equal(state.source,source,`${source}: wrong source`);
              assert.equal(state.acts,2,`${source}: acts`);
              assert.equal(state.scenes,2,`${source}: scenes`);
              assert.equal(state.pages,expectedPages,`${source}: pages`);
              assert.equal(await page.locator('.script-line').count(),60,`${source}: paragraph rendering`);
              await page.locator('[data-mode="scenes"]').click();
              assert.equal(await page.locator('#navigationList button').count(),2,`${source}: scene navigation`);
              await page.locator('#speedInput').evaluate(input=>{input.value='4';input.dispatchEvent(new Event('input',{bubbles:true}));});
              await page.locator('#stage').evaluate(node=>node.scrollTop=0);
              const before=await page.locator('#stage').evaluate(node=>node.scrollTop);
              await page.locator('#playButton').click();
              await page.waitForTimeout(1400);
              const after=await page.locator('#stage').evaluate(node=>node.scrollTop);
              console.log(`${source} scroll`,{before,after});
              assert.equal(await page.locator('#playButton').textContent(),'Pause',`${source}: play state`);
              assert.ok(after>before+3,`${source}: autoscroll did not move (${before} → ${after})`);
              await page.locator('#playButton').click();
              const paused=await page.locator('#stage').evaluate(node=>node.scrollTop);
              await page.waitForTimeout(400);
              const stillPaused=await page.locator('#stage').evaluate(node=>node.scrollTop);
              assert.ok(Math.abs(stillPaused-paused)<1,`${source}: autoscroll continued after pause`);
              assert.deepEqual(errors,[],`${source}: page errors`);
              await context.close();
            }
            await browser.close();
            console.log(`DOCX, PDF and auto-scroll passed at ${process.env.TARGET_URL}`);
          })().catch(e=>{console.error(e);process.exit(1)});
          JS