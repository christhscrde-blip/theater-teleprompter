name: Isolated verified theater data repair

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-data-builder.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-repair-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: repair/direct-data-v8
          fetch-depth: 0

      - name: Rebuild and verify direct Die Räuber data
        shell: bash
        run: |
          set -euo pipefail
          cat .github/direct-data-payload/part-*.txt > /tmp/theater-data.js.gz.b64
          echo "2fba8a94642058dd3a0a0f795a2fbe9794e8f45f064e2b39fc70bf2ad63ec149  /tmp/theater-data.js.gz.b64" | sha256sum -c -
          base64 --decode /tmp/theater-data.js.gz.b64 | gzip -dc > theater-data.js
          echo "012e08399a42f76efc9d9fac073b44dcbd9210abb95e33ccc029b994c4d035ac  theater-data.js" | sha256sum -c -
          grep -q '"title":"Die Räuber"' theater-data.js
          grep -q '"paragraphCount":1457' theater-data.js
          grep -q '"pageCount":63' theater-data.js
          grep -q '"physicalPageCount":64' theater-data.js
          grep -q '"text":"ENDE"' theater-data.js
          node --check theater-data.js

      - name: Commit only the verified data file to repair branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add theater-data.js
          if git diff --cached --quiet; then
            echo "theater-data.js ist bereits aktuell."
            exit 0
          fi
          git commit -m "Add verified direct Die Räuber data"
          git push origin HEAD:repair/direct-data-v8
