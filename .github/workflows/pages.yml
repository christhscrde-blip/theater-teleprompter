name: Build and deploy Die Räuber

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build direct Die Räuber data
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import re
          from pathlib import Path

          root = Path('.')
          chunks = []
          chunk_files = sorted((root / 'data').glob('chunk-*.js'))
          if len(chunk_files) != 9:
              raise RuntimeError(f'Erwartet wurden 9 Textpakete, gefunden wurden {len(chunk_files)}.')

          pattern = re.compile(r'push\(("(?:\\.|[^"\\])*")\)', re.DOTALL)
          for path in chunk_files:
              match = pattern.search(path.read_text(encoding='utf-8'))
              if not match:
                  raise RuntimeError(f'Kein Datenpaket in {path} gefunden.')
              chunks.append(json.loads(match.group(1)))

          compressed = base64.b64decode(''.join(chunks), validate=True)
          data = json.loads(gzip.decompress(compressed).decode('utf-8'))
          paragraphs = data.get('paragraphs')
          if data.get('title') != 'Die Räuber' or not isinstance(paragraphs, list) or len(paragraphs) < 1000:
              raise RuntimeError('Die Daten sind nicht der vollständige Text von „Die Räuber“.')

          direct_script = (
              'window.THEATER_SCRIPT='
              + json.dumps(data, ensure_ascii=False, separators=(',', ':'))
              + ';\nwindow.loadTheaterScript=async()=>window.THEATER_SCRIPT;\n'
          )
          Path('script-direct.js').write_text(direct_script, encoding='utf-8')
          print(f'{len(paragraphs)} Absätze direkt in script-direct.js geschrieben.')
          PY

      - name: Commit generated direct text
        shell: bash
        run: |
          if git diff --quiet -- script-direct.js && git ls-files --error-unmatch script-direct.js >/dev/null 2>&1; then
            echo "script-direct.js ist bereits aktuell."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add script-direct.js
            git commit -m "Generate direct Die Räuber text"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
