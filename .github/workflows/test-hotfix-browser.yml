name: Browser test theater teleprompter

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: browser-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  browser-test:
    if: github.event.pull_request.head.ref == 'hotfix/direct-json-v10'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Verify runtime files
        shell: bash
        run: |
          set -euo pipefail
          test -f theater-data.js
          test ! -f theater-loader.js
          grep -q 'theater-data.js?v=10' index.html
          grep -q 'app.js?v=10' index.html
          grep -q 'const VERSION = 10;' app.js
          grep -q "theater-teleprompter-v10" service-worker.js
          node --check theater-data.js
          node --check app.js
          node --check service-worker.js

      - name: Install Chromium test runner
        shell: bash
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Start local web server
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/theater-server.log 2>&1 &
          echo $! > /tmp/theater-server.pid
          curl --retry 20 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4173/ >/dev/null

      - name: Test every user-facing function
        shell: bash
        run: |
          set -euo pipefail
          node <<'JS'
          const assert = require('node:assert/strict');
          const { chromium } = require('playwright');

          const URL = 'http://127.0.0.1:4173/?test=v10';

          async function waitForApp(page) {
            await page.waitForFunction(() => {
              const state = window.__TELEPROMPTER__?.getState?.();
              return state?.paragraphs === 1457 && state?.currentPage === 1;
            }, null, { timeout: 15000 });
          }

          async function readState(page) {
            return page.evaluate(() => window.__TELEPROMPTER__.getState());
          }

          async function setRange(page, selector, value) {
            await page.locator(selector).evaluate((element, nextValue) => {
              element.value = String(nextValue);
              element.dispatchEvent(new Event('input', { bubbles: true }));
            }, value);
          }

          async function testViewport(browser, name, viewport, mobileMenu) {
            const context = await browser.newContext({ viewport, serviceWorkers: 'allow' });
            await context.addInitScript(() => {
              try {
                Object.defineProperty(Document.prototype, 'fullscreenEnabled', {
                  configurable: true,
                  get: () => false,
                });
              } catch {}
            });

            const page = await context.newPage();
            const errors = [];
            page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
            page.on('console', message => {
              if (message.type() === 'error') errors.push(`console: ${message.text()}`);
            });

            const response = await page.goto(URL, { waitUntil: 'networkidle' });
            assert.equal(response.status(), 200, `${name}: index response`);
            await waitForApp(page);

            let state = await readState(page);
            assert.deepEqual(
              {
                version: state.version,
                title: state.title,
                paragraphs: state.paragraphs,
                pages: state.pages,
                acts: state.acts,
                scenes: state.scenes,
                currentPage: state.currentPage,
              },
              {
                version: 10,
                title: 'Die Räuber',
                paragraphs: 1457,
                pages: 63,
                acts: 5,
                scenes: 15,
                currentPage: 1,
              },
              `${name}: exact initial state`,
            );
            assert.equal(await page.getByText('Fehler beim Laden').count(), 0, `${name}: no loading error`);
            assert.equal(await page.locator('.script-line').count(), 1457, `${name}: all paragraphs rendered`);
            assert.equal(await page.locator('.script-line').first().textContent(), 'FRIEDRICH SCHILLER');
            assert.equal(await page.locator('.script-line').last().textContent(), 'ENDE');

            assert.equal(await page.locator('.nav-link').count(), 5, `${name}: act navigation`);
            await page.locator('[data-nav="scenes"]').click();
            assert.equal(await page.locator('.nav-link').count(), 15, `${name}: scene navigation`);
            await page.locator('[data-nav="pages"]').click();
            assert.equal(await page.locator('.nav-link').count(), 64, `${name}: cover plus 63 page links`);

            await page.locator('#pageInput').fill('63');
            await page.locator('#pageJumpButton').click();
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().currentPage === 63);
            assert.equal(await page.locator('#pageText').textContent(), 'Seite 63', `${name}: direct page jump`);
            assert.equal(await page.locator('#page-63').count(), 1, `${name}: page 63 anchor`);
            assert.equal(await page.locator('.script-line.end').textContent(), 'ENDE', `${name}: ending present`);

            await page.locator('#previousPageButton').click();
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().currentPage === 62);
            await page.locator('#nextPageButton').click();
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().currentPage === 63);

            await page.evaluate(() => window.__TELEPROMPTER__.jumpToPage(1));
            await page.waitForTimeout(100);
            const beforeScroll = await page.locator('#stage').evaluate(element => element.scrollTop);
            await page.locator('#playButton').click();
            await page.waitForTimeout(900);
            const afterScroll = await page.locator('#stage').evaluate(element => element.scrollTop);
            assert(afterScroll > beforeScroll + 5, `${name}: auto scroll advances (${beforeScroll} -> ${afterScroll})`);
            assert.equal(await page.locator('#playButton').textContent(), 'Pause', `${name}: pause label while running`);
            await page.locator('#playButton').click();
            assert.equal(await page.locator('#playButton').textContent(), 'Start', `${name}: start label after pause`);

            await setRange(page, '#speedInput', 50);
            assert.equal(await page.locator('#speedValue').textContent(), '50', `${name}: speed control`);
            await setRange(page, '#fontInput', 54);
            assert.equal(await page.locator('#fontValue').textContent(), '54', `${name}: font control`);
            assert.equal(await page.locator('#scriptDisplay').evaluate(element => element.style.fontSize), '54px');
            await setRange(page, '#lineHeightInput', 1.7);
            assert.equal(await page.locator('#lineHeightValue').textContent(), '1.70', `${name}: line-height control`);

            assert(await page.locator('body').evaluate(element => element.classList.contains('dark')));
            await page.locator('#themeButton').click();
            assert.equal(await page.locator('body').evaluate(element => element.classList.contains('dark')), false, `${name}: light mode`);
            await page.locator('#themeButton').click();

            await page.locator('#fullscreenButton').click();
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().presentation === true);
            await page.locator('#fullscreenButton').click();
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().presentation === false);

            await page.keyboard.press('ArrowRight');
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().currentPage === 2);
            await page.keyboard.press('ArrowLeft');
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().currentPage === 1);
            await page.keyboard.press('Space');
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().isPlaying === true);
            await page.keyboard.press('Space');
            await page.waitForFunction(() => window.__TELEPROMPTER__.getState().isPlaying === false);

            if (mobileMenu) {
              await page.locator('#menuButton').click();
              assert(await page.locator('body').evaluate(element => element.classList.contains('menu-open')), `${name}: mobile menu opens`);
              await page.locator('#closeMenuButton').click();
              assert.equal(await page.locator('body').evaluate(element => element.classList.contains('menu-open')), false, `${name}: mobile menu closes`);
            }

            await page.reload({ waitUntil: 'networkidle' });
            await waitForApp(page);
            assert.equal(await page.locator('#fontValue').textContent(), '54', `${name}: saved font setting`);
            assert.equal(await page.locator('#speedValue').textContent(), '50', `${name}: saved speed setting`);

            if (name === 'desktop') {
              await page.evaluate(async () => {
                await navigator.serviceWorker.ready;
                if (!navigator.serviceWorker.controller) location.reload();
              });
              await page.waitForLoadState('networkidle');
              await waitForApp(page);
              await context.setOffline(true);
              await page.reload({ waitUntil: 'domcontentloaded' });
              await waitForApp(page);
              state = await readState(page);
              assert.equal(state.paragraphs, 1457, 'desktop: complete offline load');
              await context.setOffline(false);
            }

            assert.deepEqual(errors, [], `${name}: browser errors`);
            await context.close();
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            try {
              await testViewport(browser, 'desktop', { width: 1440, height: 900 }, false);
              await testViewport(browser, 'iPad', { width: 820, height: 1180 }, true);
              await testViewport(browser, 'iPhone', { width: 390, height: 844 }, true);
              console.log('All browser tests passed.');
            } finally {
              await browser.close();
            }
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          JS

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/theater-server.log || true
