name: Build verified direct theater data

on:
  push:
    branches:
      - repair/direct-data-v8
    paths:
      - .github/direct-data-build.trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild direct Die Räuber data
        shell: bash
        run: |
          set -euo pipefail
          cat .github/direct-data-payload/part-*.txt > /tmp/theater-data.js.gz.b64
          echo "2fba8a94642058ddabfb9b019352903af2eef5ad9e2702f40e67339fa4f1077c  /tmp/theater-data.js.gz.b64" | sha256sum -c -
          base64 --decode /tmp/theater-data.js.gz.b64 | gzip -dc > theater-data.js
          echo "012e08399a42f76efc9d9fac073b44dcbd9210abb95e33ccc029b994c4d035ac  theater-data.js" | sha256sum -c -
          grep -q '"title":"Die Räuber"' theater-data.js
          grep -q '"paragraphCount":1457' theater-data.js
          grep -q '"pageCount":63' theater-data.js
          grep -q '"physicalPageCount":64' theater-data.js
          grep -q '"text":"ENDE"' theater-data.js
          node --check theater-data.js

      - name: Commit generated direct data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add theater-data.js
          if git diff --cached --quiet; then
            echo "theater-data.js ist bereits aktuell."
            exit 0
          fi
          git commit -m "Add verified direct Die Räuber data"
          git push origin HEAD:repair/direct-data-v8
