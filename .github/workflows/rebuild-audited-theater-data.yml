name: Rebuild audited Die Räuber data

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-audited-theater-data
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preserved source branch
        uses: actions/checkout@v4
        with:
          ref: backup/pre-browser-audit-2026-07-21
          fetch-depth: 0

      - name: Recover, reconstruct and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import re
          import zlib
          from pathlib import Path

          alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
          pattern = re.compile(r'push\(("(?:\\.|[^"\\])*")\)', re.DOTALL)
          chunks = []
          files = sorted(Path('data').glob('chunk-*.js'))
          if len(files) != 9:
              raise RuntimeError(f'Expected 9 preserved chunks, found {len(files)}')
          for path in files:
              match = pattern.search(path.read_text(encoding='utf-8'))
              if not match:
                  raise RuntimeError(f'No payload found in {path}')
              chunks.append(json.loads(match.group(1)))

          joined = re.sub(r'[^A-Za-z0-9+/]', '', ''.join(chunks))
          if len(joined) % 4 != 1:
              raise RuntimeError(f'Unexpected damaged Base64 length: {len(joined)}')

          def pad(value):
              return value + '=' * ((4 - len(value) % 4) % 4)

          # Decode with a harmless symbol appended. Bytes before the missing
          # symbol remain valid, allowing zlib to reveal the corruption area.
          probe = base64.b64decode(pad(joined + 'A'), validate=True)
          decoder = zlib.decompressobj(16 + zlib.MAX_WBITS)
          failure_byte = None
          offset = 0
          step = 32
          while offset < len(probe):
              block = probe[offset:offset + step]
              try:
                  decoder.decompress(block)
              except zlib.error:
                  failure_byte = offset
                  break
              offset += len(block)
          if failure_byte is None:
              failure_byte = len(probe)

          estimate = max(0, min(len(joined), (failure_byte // 3) * 4))
          report = {
              'damaged_length': len(joined),
              'probe_bytes': len(probe),
              'zlib_failure_byte': failure_byte,
              'estimated_base64_position': estimate,
              'searched': []
          }

          recovered = None
          winning = None
          for radius in (96, 384, 1536):
              start = max(0, estimate - radius)
              end = min(len(joined), estimate + radius + 1)
              report['searched'].append({'radius': radius, 'start': start, 'end': end})
              for position in range(start, end):
                  prefix = joined[:position]
                  suffix = joined[position:]
                  for symbol in alphabet:
                      candidate = prefix + symbol + suffix
                      try:
                          compressed = base64.b64decode(pad(candidate), validate=True)
                          raw = gzip.decompress(compressed).decode('utf-8')
                          data = json.loads(raw)
                      except Exception:
                          continue
                      paragraphs = data.get('paragraphs', [])
                      if (
                          data.get('title') == 'Die Räuber'
                          and len(paragraphs) == 1457
                          and len(data.get('acts', [])) == 5
                          and len(data.get('scenes', [])) == 15
                          and paragraphs[0].get('text') == 'FRIEDRICH SCHILLER'
                          and paragraphs[-1].get('text') == 'ENDE'
                      ):
                          recovered = data
                          winning = {'position': position, 'symbol': symbol, 'radius': radius}
                          break
                  if recovered is not None:
                      break
              if recovered is not None:
                  break

          report['winning_repair'] = winning
          Path('/tmp/theater-recovery.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          if recovered is None:
              raise RuntimeError(f'No valid single-symbol repair found near Base64 position {estimate}')

          for paragraph in recovered['paragraphs']:
              paragraph['page'] = max(0, int(paragraph.get('page', 1)) - 1)
          for key in ('acts', 'scenes', 'pages'):
              for entry in recovered.get(key, []):
                  if 'page' in entry:
                      entry['page'] = max(0, int(entry['page']) - 1)
          recovered['pageCount'] = 63
          recovered['physicalPageCount'] = 64
          recovered['paragraphCount'] = len(recovered['paragraphs'])

          source = (
              'window.THEATER_SCRIPT='
              + json.dumps(recovered, ensure_ascii=False, separators=(',', ':'))
              + ';\nwindow.loadTheaterScript=async()=>window.THEATER_SCRIPT;\n'
          )
          Path('/tmp/theater-data.js').write_text(source, encoding='utf-8')
          PY
          node --check /tmp/theater-data.js

      - name: Commit validated result to repair branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin repair/direct-data-v8
          git checkout repair/direct-data-v8
          mkdir -p .audit
          cp /tmp/theater-recovery.json .audit/theater-recovery.json
          cp /tmp/theater-data.js theater-data.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .audit/theater-recovery.json theater-data.js
          if git diff --cached --quiet; then
            echo 'Recovered data is already current.'
            exit 0
          fi
          git commit -m 'Recover and validate direct Die Räuber data'
          git push origin HEAD:repair/direct-data-v8
