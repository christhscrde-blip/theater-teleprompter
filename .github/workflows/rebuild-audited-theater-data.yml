name: Audit current theater payloads

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-payloads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Audit payload assembly
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import re
          from pathlib import Path

          files = sorted(Path('.').glob('theater-payload-*.txt'))
          report = {'files': [], 'strategies': {}}
          alphabet = re.compile(r'[^A-Za-z0-9+/=]')

          def normalize(value, remove_all_padding=False):
              value = alphabet.sub('', value)
              if remove_all_padding:
                  value = value.replace('=', '')
              else:
                  value = value.rstrip('=')
              return value + '=' * ((4 - len(value) % 4) % 4)

          def parse_payload(raw_bytes):
              text = gzip.decompress(raw_bytes).decode('utf-8').strip()
              if text.startswith('window.THEATER_SCRIPT=') and text.endswith(';'):
                  text = text[len('window.THEATER_SCRIPT='):-1]
              data = json.loads(text)
              paragraphs = data.get('paragraphs', [])
              if not (
                  data.get('title') == 'Die Räuber'
                  and len(paragraphs) == 1457
                  and len(data.get('acts', [])) == 5
                  and len(data.get('scenes', [])) == 15
                  and paragraphs[0].get('text') == 'FRIEDRICH SCHILLER'
                  and paragraphs[-1].get('text') == 'ENDE'
              ):
                  raise RuntimeError('Decoded JSON failed theater validation')
              return data

          raw_texts = [path.read_text(encoding='utf-8') for path in files]
          for path, text in zip(files, raw_texts):
              cleaned = alphabet.sub('', text)
              report['files'].append({
                  'file': str(path),
                  'rawLength': len(text),
                  'cleanLength': len(cleaned),
                  'paddingCount': cleaned.count('='),
                  'moduloWithoutPadding': len(cleaned.replace('=', '')) % 4,
                  'starts': cleaned[:16],
                  'ends': cleaned[-16:]
              })

          results = {}

          def attempt(name, callback):
              try:
                  data = callback()
                  results[name] = data
                  report['strategies'][name] = {
                      'success': True,
                      'paragraphs': len(data['paragraphs']),
                      'pages': data.get('pageCount'),
                      'first': data['paragraphs'][0]['text'],
                      'last': data['paragraphs'][-1]['text']
                  }
              except Exception as error:
                  report['strategies'][name] = {
                      'success': False,
                      'errorType': type(error).__name__,
                      'error': str(error)
                  }

          attempt('joined_without_padding', lambda: parse_payload(
              base64.b64decode(normalize(''.join(raw_texts), True), validate=True)
          ))

          attempt('decode_each_then_join_bytes', lambda: parse_payload(b''.join(
              base64.b64decode(normalize(text), validate=True) for text in raw_texts
          )))

          def longest_runs():
              parts = []
              for text in raw_texts:
                  runs = re.findall(r'[A-Za-z0-9+/=]{100,}', text)
                  if not runs:
                      raise RuntimeError('No long Base64 run found')
                  parts.append(base64.b64decode(normalize(max(runs, key=len)), validate=True))
              return parse_payload(b''.join(parts))

          attempt('longest_run_per_file', longest_runs)

          Path('/tmp/payload-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )

          if results:
              name = sorted(results)[0]
              data = results[name]
              source = (
                  'window.THEATER_SCRIPT='
                  + json.dumps(data, ensure_ascii=False, separators=(',', ':'))
                  + ';\nwindow.loadTheaterScript=async()=>window.THEATER_SCRIPT;\n'
              )
              Path('/tmp/theater-data.js').write_text(source, encoding='utf-8')
          PY

      - name: Store report and validated direct data
        shell: bash
        run: |
          set -euo pipefail
          branch='${{ github.event.pull_request.head.ref }}'
          if test -z "$branch"; then branch='hotfix/direct-json-v10'; fi
          git checkout "$branch"
          mkdir -p .audit
          cp /tmp/payload-report.json .audit/payload-report.json
          if test -f /tmp/theater-data.js; then cp /tmp/theater-data.js theater-data.js; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .audit/payload-report.json
          if test -f theater-data.js; then git add theater-data.js; fi
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Record exact online payload audit'
          git push origin "HEAD:$branch"
