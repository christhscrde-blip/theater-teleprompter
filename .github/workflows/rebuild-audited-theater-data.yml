name: Audit current theater payloads

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-payloads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Test every supported payload assembly
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import re
          from pathlib import Path

          files = sorted(Path('.').glob('theater-payload-*.txt'))
          if not files:
              raise RuntimeError('No theater-payload files found')

          alphabet = re.compile(r'[^A-Za-z0-9+/=]')

          def normalize(value, remove_all_padding=False):
              value = alphabet.sub('', value)
              if remove_all_padding:
                  value = value.replace('=', '')
              else:
                  value = value.rstrip('=')
              return value + '=' * ((4 - len(value) % 4) % 4)

          def parse_payload(raw_bytes):
              text = gzip.decompress(raw_bytes).decode('utf-8').strip()
              if text.startswith('window.THEATER_SCRIPT=') and text.endswith(';'):
                  text = text[len('window.THEATER_SCRIPT='):-1]
              data = json.loads(text)
              paragraphs = data.get('paragraphs', [])
              valid = (
                  data.get('title') == 'Die Räuber'
                  and len(paragraphs) == 1457
                  and len(data.get('acts', [])) == 5
                  and len(data.get('scenes', [])) == 15
                  and paragraphs[0].get('text') == 'FRIEDRICH SCHILLER'
                  and paragraphs[-1].get('text') == 'ENDE'
              )
              if not valid:
                  raise RuntimeError('Decoded JSON failed theater validation')
              return data

          raw_texts = [path.read_text(encoding='utf-8') for path in files]
          print('FILES')
          for path, text in zip(files, raw_texts):
              cleaned = alphabet.sub('', text)
              print({
                  'file': str(path),
                  'raw_length': len(text),
                  'clean_length': len(cleaned),
                  'padding_count': cleaned.count('='),
                  'starts': cleaned[:12],
                  'ends': cleaned[-12:]
              })

          strategies = {}

          # Strategy 1: one Base64 stream, discarding all embedded padding.
          try:
              joined = ''.join(raw_texts)
              decoded = base64.b64decode(normalize(joined, remove_all_padding=True), validate=True)
              strategies['joined_without_padding'] = parse_payload(decoded)
              print('SUCCESS joined_without_padding')
          except Exception as error:
              print('FAIL joined_without_padding:', type(error).__name__, error)

          # Strategy 2: each file is independently Base64 encoded; concatenate bytes.
          try:
              byte_parts = [
                  base64.b64decode(normalize(text, remove_all_padding=False), validate=True)
                  for text in raw_texts
              ]
              strategies['decode_each_then_join_bytes'] = parse_payload(b''.join(byte_parts))
              print('SUCCESS decode_each_then_join_bytes')
          except Exception as error:
              print('FAIL decode_each_then_join_bytes:', type(error).__name__, error)

          # Strategy 3: extract the longest Base64-looking run from each wrapper file.
          try:
              byte_parts = []
              for text in raw_texts:
                  runs = re.findall(r'[A-Za-z0-9+/=]{100,}', text)
                  if not runs:
                      raise RuntimeError('No long Base64 run found')
                  candidate = max(runs, key=len)
                  byte_parts.append(base64.b64decode(normalize(candidate), validate=True))
              strategies['longest_run_per_file'] = parse_payload(b''.join(byte_parts))
              print('SUCCESS longest_run_per_file')
          except Exception as error:
              print('FAIL longest_run_per_file:', type(error).__name__, error)

          if not strategies:
              raise RuntimeError('No payload assembly strategy produced a valid theater script')

          print('VALIDATED_STRATEGIES', sorted(strategies))
          PY
