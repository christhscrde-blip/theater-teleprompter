name: Recover and test direct theater data

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recover-direct-theater-data-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  recover-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Find the fully valid Base64 prefix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import json
          import re
          from pathlib import Path

          files = sorted(Path('.').glob('theater-payload-*.txt'))
          if len(files) != 4:
              raise RuntimeError(f'Expected 4 payload files, found {len(files)}')

          raw_texts = [path.read_text(encoding='utf-8') for path in files]
          joined = re.sub(r'[^A-Za-z0-9+/]', '', ''.join(raw_texts))
          report = {
              'sourceFiles': [str(path) for path in files],
              'sourceLengths': [len(text) for text in raw_texts],
              'cleanCombinedLength': len(joined),
              'testedPrefixLengths': 0,
              'validPrefixLength': None,
              'discardedTailLength': None
          }

          def parse_candidate(encoded):
              compressed = base64.b64decode(encoded, validate=True)
              source = gzip.decompress(compressed).decode('utf-8').strip()
              prefix = 'window.THEATER_SCRIPT='
              if source.startswith(prefix) and source.endswith(';'):
                  source = source[len(prefix):-1]
              data = json.loads(source)
              paragraphs = data.get('paragraphs', [])
              if data.get('title') != 'Die Räuber':
                  raise RuntimeError('wrong title')
              if len(paragraphs) != 1457:
                  raise RuntimeError('wrong paragraph count')
              if len(data.get('acts', [])) != 5:
                  raise RuntimeError('wrong act count')
              if len(data.get('scenes', [])) != 15:
                  raise RuntimeError('wrong scene count')
              if paragraphs[0].get('text') != 'FRIEDRICH SCHILLER':
                  raise RuntimeError('wrong beginning')
              if paragraphs[-1].get('text') != 'ENDE':
                  raise RuntimeError('wrong ending')
              return data

          valid_data = None
          valid_length = None
          upper = len(joined) - (len(joined) % 4)
          lower = 58000
          for length in range(upper, lower - 1, -4):
              report['testedPrefixLengths'] += 1
              try:
                  data = parse_candidate(joined[:length])
              except Exception:
                  continue
              valid_data = data
              valid_length = length
              break

          if valid_data is None:
              Path('/tmp/prefix-recovery-report.json').write_text(
                  json.dumps(report, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8'
              )
              raise RuntimeError('No fully validated Base64 prefix was found')

          report['validPrefixLength'] = valid_length
          report['discardedTailLength'] = len(joined) - valid_length
          report['paragraphs'] = len(valid_data['paragraphs'])
          report['acts'] = len(valid_data['acts'])
          report['scenes'] = len(valid_data['scenes'])
          report['first'] = valid_data['paragraphs'][0]['text']
          report['last'] = valid_data['paragraphs'][-1]['text']

          # Normalize the title sheet to page 0 only when the preserved data
          # still numbers it as page 1. Avoid shifting an already-normalized set.
          pages = [int(item.get('page', 0)) for item in valid_data['paragraphs']]
          if min(pages) >= 1:
              for paragraph in valid_data['paragraphs']:
                  paragraph['page'] = max(0, int(paragraph.get('page', 1)) - 1)
              for key in ('acts', 'scenes', 'pages'):
                  for entry in valid_data.get(key, []):
                      if 'page' in entry:
                          entry['page'] = max(0, int(entry['page']) - 1)

          valid_data['pageCount'] = 63
          valid_data['physicalPageCount'] = 64
          valid_data['paragraphCount'] = 1457

          source = (
              'window.THEATER_SCRIPT='
              + json.dumps(valid_data, ensure_ascii=False, separators=(',', ':'))
              + ';\nwindow.loadTheaterScript=async()=>window.THEATER_SCRIPT;\n'
          )
          Path('/tmp/theater-data.js').write_text(source, encoding='utf-8')
          Path('/tmp/prefix-recovery-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )
          PY
          node --check /tmp/theater-data.js

      - name: Commit the validated direct data to the hotfix branch
        shell: bash
        run: |
          set -euo pipefail
          branch='${{ github.event.pull_request.head.ref }}'
          if test -z "$branch"; then branch='hotfix/direct-json-v10'; fi
          git checkout "$branch"
          mkdir -p .audit
          cp /tmp/prefix-recovery-report.json .audit/prefix-recovery-report.json
          cp /tmp/theater-data.js theater-data.js
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .audit/prefix-recovery-report.json theater-data.js
          if git diff --cached --quiet; then
            echo 'Validated direct data is already current.'
            exit 0
          fi
          git commit -m 'Generate fully validated direct Die Räuber data'
          git push origin "HEAD:$branch"
