name: Verify and build direct theater data

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: direct-theater-data-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-direct-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Verify every transport block
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t blocks < <(find .payload-v10 -maxdepth 1 -type f -name 'block-*.b64' | sort)
          test "${#blocks[@]}" -eq 16

          for index in $(seq -w 1 15); do
            test "$(wc -c < ".payload-v10/block-${index}.b64")" -eq 4096
          done
          test "$(wc -c < .payload-v10/block-16.b64)" -eq 1896

          cat "${blocks[@]}" > /tmp/theater-data.b64
          test "$(wc -c < /tmp/theater-data.b64)" -eq 63336
          echo '43fe8f342fd0ada6cc581742e2d96650959be3803cefc428d55c5a6ccfefa0e5  /tmp/theater-data.b64' | sha256sum -c -

      - name: Decode and validate the complete script
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode /tmp/theater-data.b64 > /tmp/theater-data.json.gz
          echo 'fe2cf6547329797bdafa21aa5beaef32752e4d2f411f358e39ee00a828689703  /tmp/theater-data.json.gz' | sha256sum -c -
          gzip -dc /tmp/theater-data.json.gz > /tmp/theater-data.json
          echo '87c35d3b503758c201e23cbc59acf34d003b47106405db016df03e414ab916e5  /tmp/theater-data.json' | sha256sum -c -

          python3 - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          raw = Path('/tmp/theater-data.json').read_bytes()
          data = json.loads(raw)
          paragraphs = data.get('paragraphs', [])

          checks = {
              'title': data.get('title') == 'Die Räuber',
              'paragraphs': len(paragraphs) == 1457,
              'pageCount': data.get('pageCount') == 63,
              'physicalPageCount': data.get('physicalPageCount') == 64,
              'acts': len(data.get('acts', [])) == 5,
              'scenes': len(data.get('scenes', [])) == 15,
              'first': paragraphs and paragraphs[0].get('text') == 'FRIEDRICH SCHILLER',
              'last': paragraphs and paragraphs[-1].get('text') == 'ENDE',
              'minimumPage': min(item.get('page', -1) for item in paragraphs) == 0,
              'maximumPage': max(item.get('page', -1) for item in paragraphs) == 63,
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise RuntimeError('Validation failed: ' + ', '.join(failed))

          source = (
              'window.THEATER_SCRIPT='
              + json.dumps(data, ensure_ascii=False, separators=(',', ':'))
              + ';\nwindow.loadTheaterScript=async()=>window.THEATER_SCRIPT;\n'
          )
          Path('/tmp/theater-data.js').write_text(source, encoding='utf-8')

          report = {
              'sourceBase64Sha256': '43fe8f342fd0ada6cc581742e2d96650959be3803cefc428d55c5a6ccfefa0e5',
              'gzipSha256': 'fe2cf6547329797bdafa21aa5beaef32752e4d2f411f358e39ee00a828689703',
              'jsonSha256': hashlib.sha256(raw).hexdigest(),
              'paragraphs': len(paragraphs),
              'pages': data['pageCount'],
              'physicalPages': data['physicalPageCount'],
              'acts': len(data['acts']),
              'scenes': len(data['scenes']),
              'first': paragraphs[0]['text'],
              'last': paragraphs[-1]['text'],
          }
          Path('/tmp/direct-data-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          node --check /tmp/theater-data.js

      - name: Commit only the validated direct file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .audit
          cp /tmp/theater-data.js theater-data.js
          cp /tmp/direct-data-report.json .audit/direct-data-report.json
          rm -f .payload-v10/chunk-*.b64
          rm -f .audit/payload-report.json .audit/prefix-recovery-report.json

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add theater-data.js .audit/direct-data-report.json .payload-v10 .audit
          if git diff --cached --quiet; then
            echo 'Validated direct data is already current.'
            exit 0
          fi
          git commit -m 'Generate hash-verified direct Die Räuber data'
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"
