name: Version 10 acceptance full log

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  acceptance-log:
    if: github.event.pull_request.head.ref == 'hotfix/direct-json-v10'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Start server
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/server.log 2>&1 &
          curl --retry 20 --retry-delay 1 --retry-connrefused -fsS http://127.0.0.1:4173/ >/dev/null

      - name: Run test and preserve complete output
        id: acceptance
        shell: bash
        run: |
          set +e
          node tests/v10-acceptance.cjs > /tmp/v10-acceptance.log 2>&1
          status=$?
          cat /tmp/v10-acceptance.log
          echo "$status" > /tmp/v10-acceptance.status
          exit 0

      - name: Upload complete acceptance output
        uses: actions/upload-artifact@v4
        with:
          name: v10-acceptance-output
          path: |
            /tmp/v10-acceptance.log
            /tmp/v10-acceptance.status
            /tmp/server.log
          if-no-files-found: error
          retention-days: 1

      - name: Require passing status
        run: test "$(cat /tmp/v10-acceptance.status)" = '0'
